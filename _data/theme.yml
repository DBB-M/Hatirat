##########
# HATIRAT - theme.yml
##########

##########
# HOME PAGE
#
featured-image:
##########
# NAVBAR
#
navbar-color: navy
navbar-background: custom
##########
# BROWSE
#
browse-buttons: false
##########
# SUBJECTS / LOCATIONS TAG CLOUDS
#
subjects-fields: subject;period;yontem
subjects-min: 1
subjects-stopwords:
locations-field: place_of_birth
locations-min: 1
##########
# MAP
#
map-base: OpenStreetMap_Mapnik
map-cluster: true
map-cluster-radius: 25
map-search: true
map-search-fuzziness: 0.35
auto-center-map: true
latitude: 39
longitude: 35
zoom-level: 6
##########
# TIMELINE
#
timeline-field: date
year-nav-increment: 25
##########
# FONTS
#
base-font-size: 17px
