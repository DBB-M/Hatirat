<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hatırat portalı banner görseli</title>
<desc>El yazısı metin dokusu, isimler ve ağ çizgilerinden oluşan kompozisyon</desc>

<defs>
  <style>
    .bg { fill: #1a2535; }
    .line-net { stroke: #4a8fa8; stroke-width: 0.8; fill: none; opacity: 0.35; }
    .node-circle { fill: #4a8fa8; opacity: 0.7; }
    .node-circle-sm { fill: #c4a95a; opacity: 0.6; }
    .text-faint { font-family: Georgia, serif; fill: #5a7a9a; font-style: italic; opacity: 0.3; }
    .text-name { font-family: Georgia, serif; fill: #a8c8d8; font-style: italic; opacity: 0.55; }
    .text-name-bright { font-family: Georgia, serif; fill: #c4dde8; font-style: italic; opacity: 0.8; }
    .hatching { stroke: #2a3f58; stroke-width: 0.4; opacity: 0.4; }
  </style>
</defs>

<rect width="680" height="340" class="bg"/>

<!-- Defter çizgileri -->
<line x1="0" y1="48" x2="680" y2="48" class="hatching"/>
<line x1="0" y1="68" x2="680" y2="68" class="hatching"/>
<line x1="0" y1="88" x2="680" y2="88" class="hatching"/>
<line x1="0" y1="108" x2="680" y2="108" class="hatching"/>
<line x1="0" y1="128" x2="680" y2="128" class="hatching"/>
<line x1="0" y1="148" x2="680" y2="148" class="hatching"/>
<line x1="0" y1="168" x2="680" y2="168" class="hatching"/>
<line x1="0" y1="188" x2="680" y2="188" class="hatching"/>
<line x1="0" y1="208" x2="680" y2="208" class="hatching"/>
<line x1="0" y1="228" x2="680" y2="228" class="hatching"/>
<line x1="0" y1="248" x2="680" y2="248" class="hatching"/>
<line x1="0" y1="268" x2="680" y2="268" class="hatching"/>
<line x1="0" y1="288" x2="680" y2="288" class="hatching"/>
<line x1="0" y1="308" x2="680" y2="308" class="hatching"/>

<!-- Metin dokusu -->
<text x="20" y="42" class="text-faint" font-size="10">…o günleri bir daha anlatmak isterdim, fakat kalem tutmak güçleşmişti…</text>
<text x="40" y="75" class="text-faint" font-size="9">…İstanbul sokaklarında yürürken aklımdan geçenler…</text>
<text x="10" y="115" class="text-faint" font-size="10">…Mütareke yıllarında şehir bambaşka bir görünüm almıştı…</text>
<text x="60" y="155" class="text-faint" font-size="9">…hatıralarım beni terk etmeden önce kaleme almalıydım…</text>
<text x="20" y="195" class="text-faint" font-size="10">…o mecliste pek çok değerli insanla tanıştım, adlarını hâlâ taşırım…</text>
<text x="80" y="235" class="text-faint" font-size="9">…annem her sabah aynı duayı okurdu, sesi hâlâ kulaklarımda…</text>
<text x="30" y="272" class="text-faint" font-size="10">…savaş yıllarında yazdıklarım sayfalar arasında kaybolup gitti…</text>
<text x="10" y="310" class="text-faint" font-size="9">…Ankara'ya ilk gittiğimde şehir henüz kurulmaktaydı…</text>
<text x="350" y="55" class="text-faint" font-size="9">…kaleme aldığım her satır bir şahitliktir…</text>
<text x="400" y="95" class="text-faint" font-size="10">…o dönemin ruhunu aktarmak istedim…</text>
<text x="360" y="135" class="text-faint" font-size="9">…mektuplar yıllar sonra bulundu, sandıktan çıktı…</text>
<text x="420" y="175" class="text-faint" font-size="10">…çocukluğumun mahallesi artık tanınmaz hâldeydi…</text>
<text x="380" y="215" class="text-faint" font-size="9">…devrin büyükleriyle oturur konuşurduk…</text>
<text x="410" y="255" class="text-faint" font-size="10">…bu satırları torunlarım için yazıyorum…</text>
<text x="370" y="295" class="text-faint" font-size="9">…hafızam bazen ihanet eder, bazen sadık kalır…</text>

<!-- Ağ çizgileri -->
<line x1="120" y1="80" x2="240" y2="130" class="line-net"/>
<line x1="240" y1="130" x2="380" y2="90" class="line-net"/>
<line x1="380" y1="90" x2="520" y2="150" class="line-net"/>
<line x1="120" y1="80" x2="180" y2="200" class="line-net"/>
<line x1="180" y1="200" x2="300" y2="240" class="line-net"/>
<line x1="300" y1="240" x2="460" y2="210" class="line-net"/>
<line x1="460" y1="210" x2="580" y2="260" class="line-net"/>
<line x1="240" y1="130" x2="300" y2="240" class="line-net"/>
<line x1="380" y1="90" x2="460" y2="210" class="line-net"/>
<line x1="520" y1="150" x2="580" y2="260" class="line-net"/>
<line x1="180" y1="200" x2="80" y2="270" class="line-net"/>
<line x1="80" y1="270" x2="160" y2="310" class="line-net"/>
<line x1="580" y1="260" x2="630" y2="180" class="line-net"/>
<line x1="630" y1="180" x2="600" y2="80" class="line-net"/>
<line x1="600" y1="80" x2="520" y2="150" class="line-net"/>

<!-- Düğümler ve isimler -->
<circle cx="120" cy="80" r="5" class="node-circle"/>
<text x="128" y="75" class="text-name" font-size="11">Halide Edib</text>

<circle cx="240" cy="130" r="7" class="node-circle"/>
<text x="250" y="125" class="text-name-bright" font-size="12">Yakup Kadri</text>

<circle cx="380" cy="90" r="6" class="node-circle"/>
<text x="390" y="85" class="text-name" font-size="11">Falih Rıfkı</text>

<circle cx="520" cy="150" r="5" class="node-circle"/>
<text x="528" y="145" class="text-name" font-size="10">Peyami Safa</text>

<circle cx="180" cy="200" r="8" class="node-circle"/>
<text x="190" y="195" class="text-name-bright" font-size="13">Halidé Nusret</text>

<circle cx="300" cy="240" r="6" class="node-circle"/>
<text x="310" y="235" class="text-name" font-size="11">Ahmet Hamdi</text>

<circle cx="460" cy="210" r="5" class="node-circle"/>
<text x="468" y="205" class="text-name" font-size="10">Sabahattin Ali</text>

<circle cx="580" cy="260" r="7" class="node-circle"/>
<text x="588" y="255" class="text-name" font-size="11">Hüseyin Cahit</text>

<circle cx="80" cy="270" r="4" class="node-circle-sm"/>
<text x="88" y="265" class="text-name" font-size="10">Müfide Ferit</text>

<circle cx="160" cy="310" r="4" class="node-circle-sm"/>
<text x="168" y="305" class="text-name" font-size="10">Selma Rıza</text>

<circle cx="630" cy="180" r="5" class="node-circle-sm"/>
<text x="590" y="175" class="text-name" font-size="10" text-anchor="end">Refik Halid</text>

<circle cx="600" cy="80" r="4" class="node-circle-sm"/>
<text x="560" y="75" class="text-name" font-size="10" text-anchor="end">Ruşen Eşref</text>

<!-- Sol kenar çizgisi -->
<line x1="38" y1="0" x2="38" y2="340" stroke="#c4a95a" stroke-width="0.6" opacity="0.2"/>

<!-- Sağ alt imza -->
<text x="650" y="325" class="text-faint" font-size="9" text-anchor="end" opacity="0.4">DBB · Hatırat Portalı</text>
</svg>
