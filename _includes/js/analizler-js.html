{%- assign items = site.data[site.metadata] -%}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
var rawItems = [
    {% for item in items %}
    {
        "title": {{ item.title | default: "" | jsonify }},
        "creator": {{ item.creator | default: "" | jsonify }},
        "subject": {{ item.subject | default: "" | jsonify }},
        "publisher": {{ item.publisher | default: "" | jsonify }},
        "date": {{ item.date | default: "" | jsonify }},
        "important_names": {{ item.important_names | default: "" | jsonify }},
        "important_institutions": {{ item.important_institutions | default: "" | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
];

// ── YARDIMCI FONKSİYONLAR ──────────────────────────────────────────────────

function countFreq(field, separator) {
    var freq = {};
    rawItems.forEach(function(item) {
        var val = item[field];
        if (!val) return;
        val.split(separator).forEach(function(v) {
            v = v.trim();
            if (v) freq[v] = (freq[v] || 0) + 1;
        });
    });
    return freq;
}

function topN(freqMap, n) {
    return Object.entries(freqMap)
        .sort(function(a,b){ return b[1]-a[1]; })
        .slice(0, n);
}

var CB_COLORS = [
    "#2a7f8c","#4a9098","#c4a95a","#7a3030","#534ab7",
    "#0f6e56","#a08050","#3a6b72","#8c5a2a","#4a3ab7"
];

function chartColors(n) {
    var colors = [];
    for (var i = 0; i < n; i++) colors.push(CB_COLORS[i % CB_COLORS.length]);
    return colors;
}

// ── 1. TÜR CHART ───────────────────────────────────────────────────────────
var turFreq = countFreq("subject", ";");
var turTop = topN(turFreq, 15);
new Chart(document.getElementById("chartTur"), {
    type: "bar",
    data: {
        labels: turTop.map(function(e){ return e[0].length > 30 ? e[0].substring(0,28)+"…" : e[0]; }),
        datasets: [{
            label: "Eser Sayısı",
            data: turTop.map(function(e){ return e[1]; }),
            backgroundColor: chartColors(turTop.length)
        }]
    },
    options: {
        indexAxis: "y",
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
    }
});

// ── 2. YAZAR CHART ─────────────────────────────────────────────────────────
var yazarFreq = countFreq("creator", ";");
var yazarTop = topN(yazarFreq, 20);
new Chart(document.getElementById("chartYazar"), {
    type: "bar",
    data: {
        labels: yazarTop.map(function(e){ return e[0].length > 25 ? e[0].substring(0,23)+"…" : e[0]; }),
        datasets: [{
            label: "Eser Sayısı",
            data: yazarTop.map(function(e){ return e[1]; }),
            backgroundColor: "#2a7f8c"
        }]
    },
    options: {
        indexAxis: "y",
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
    }
});

// ── 3. ÖNEMLİ KİŞİLER CHART ───────────────────────────────────────────────
var kisiFreq = countFreq("important_names", ",");
var kisiTop = topN(kisiFreq, 20);
new Chart(document.getElementById("chartKisi"), {
    type: "bar",
    data: {
        labels: kisiTop.map(function(e){ return e[0].length > 25 ? e[0].substring(0,23)+"…" : e[0]; }),
        datasets: [{
            label: "Geçtiği Eser Sayısı",
            data: kisiTop.map(function(e){ return e[1]; }),
            backgroundColor: "#c4a95a"
        }]
    },
    options: {
        indexAxis: "y",
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
    }
});

// ── 4. KELİME BULUTU ───────────────────────────────────────────────────────
var stopwords = new Set(["ve","ile","bir","bu","da","de","den","den","için","olan","olan",
    "ki","bu","şu","o","mi","mu","mü","mı","ne","ya","ama","fakat","lakin",
    "hatırat","hatıratları","hatıratı","anı","anılar","anılarım","anılarımdan",
    "hayatım","hayatımdan","yaşamım","yaşantım"]);

var kelimeFreq = {};
rawItems.forEach(function(item) {
    if (!item.title) return;
    item.title.toLowerCase()
        .replace(/[^\wşçöüğı\s]/gi, " ")
        .split(/\s+/)
        .forEach(function(w) {
            w = w.trim();
            if (w.length > 2 && !stopwords.has(w)) {
                kelimeFreq[w] = (kelimeFreq[w] || 0) + 1;
            }
        });
});

var kelimeTop = topN(kelimeFreq, 60);
var kMax = kelimeTop[0][1];
var kMin = kelimeTop[kelimeTop.length-1][1];
var kelimeHtml = "";
kelimeTop.forEach(function(e) {
    var size = kMin === kMax ? 1.2 : 0.7 + ((e[1]-kMin)/(kMax-kMin)) * 2.3;
    var opacity = 0.5 + ((e[1]-kMin)/(kMax-kMin||1)) * 0.5;
    kelimeHtml += '<span style="font-size:'+size.toFixed(2)+'rem;color:#2a7f8c;opacity:'+opacity.toFixed(2)+';margin:0 .3rem;cursor:default;" title="'+e[1]+' kez">'+e[0]+'</span> ';
});
document.getElementById("kelimeCloud").innerHTML = kelimeHtml;

// ── 5. ZAMAN ANALİZİ ───────────────────────────────────────────────────────
var yilFreq = {};
rawItems.forEach(function(item) {
    var d = item.date;
    if (!d) return;
    var y = parseInt(d);
    if (y >= 1737 && y <= 2020) {
        yilFreq[y] = (yilFreq[y] || 0) + 1;
    }
});

// 10 yıllık dilimler
var dilimFreq = {};
for (var y = 1730; y <= 2020; y += 10) {
    var label = y + "–" + (y+9);
    dilimFreq[label] = 0;
}
Object.entries(yilFreq).forEach(function(e) {
    var y = parseInt(e[0]);
    var dilim = Math.floor(y/10)*10;
    var label = dilim + "–" + (dilim+9);
    if (dilimFreq.hasOwnProperty(label)) dilimFreq[label] += e[1];
});

var zamanLabels = Object.keys(dilimFreq).filter(function(k){ return dilimFreq[k] > 0; });
var zamanData = zamanLabels.map(function(k){ return dilimFreq[k]; });

new Chart(document.getElementById("chartZaman"), {
    type: "line",
    data: {
        labels: zamanLabels,
        datasets: [{
            label: "Eser Sayısı",
            data: zamanData,
            borderColor: "#2a7f8c",
            backgroundColor: "rgba(42,127,140,0.15)",
            fill: true,
            tension: 0.3,
            pointBackgroundColor: "#c4a95a",
            pointRadius: 5
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
    }
});

// ── 6. AĞ ANALİZLERİ (D3) ─────────────────────────────────────────────────

function drawNetwork(containerId, nodes, links, nodeColor) {
    var container = document.getElementById(containerId);
    var W = container.clientWidth || 700;
    var H = container.clientHeight || 500;

    var svg = d3.select("#"+containerId).append("svg")
        .attr("width", W).attr("height", H);

    var sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(function(d){ return d.id; }).distance(80))
        .force("charge", d3.forceManyBody().strength(-120))
        .force("center", d3.forceCenter(W/2, H/2));

    var link = svg.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("stroke", "#d0c8b0")
        .attr("stroke-width", function(d){ return Math.sqrt(d.value||1); });

    var node = svg.append("g")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", function(d){ return 4 + (d.weight||1)*0.8; })
        .attr("fill", function(d){ return d.type === "A" ? "#2a7f8c" : (d.type === "B" ? "#c4a95a" : "#7a3030"); })
        .attr("stroke", "#fff")
        .attr("stroke-width", 1.5)
        .call(d3.drag()
            .on("start", function(event,d){ if (!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on("drag", function(event,d){ d.fx=event.x; d.fy=event.y; })
            .on("end", function(event,d){ if (!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

    var label = svg.append("g")
        .selectAll("text")
        .data(nodes.filter(function(d){ return (d.weight||1) > 1; }))
        .join("text")
        .attr("font-size", "9px")
        .attr("fill", "#2a1f0e")
        .text(function(d){ return d.id.length > 20 ? d.id.substring(0,18)+"…" : d.id; });

    sim.on("tick", function() {
        link.attr("x1",function(d){ return d.source.x; })
            .attr("y1",function(d){ return d.source.y; })
            .attr("x2",function(d){ return d.target.x; })
            .attr("y2",function(d){ return d.target.y; });
        node.attr("cx",function(d){ return d.x; }).attr("cy",function(d){ return d.y; });
        label.attr("x",function(d){ return d.x+6; }).attr("y",function(d){ return d.y+3; });
    });
}

// Yazar-Kişi Ağı (ilk 15 yazar, her yazarın ilk 3 kişisi)
(function() {
    var yazarKisiLinks = {};
    rawItems.forEach(function(item) {
        var creator = item.creator ? item.creator.split(";")[0].trim() : null;
        if (!creator) return;
        if (!item.important_names) return;
        item.important_names.split(",").slice(0,3).forEach(function(k) {
            k = k.trim();
            if (!k) return;
            var key = creator + "|||" + k;
            yazarKisiLinks[key] = (yazarKisiLinks[key]||0) + 1;
        });
    });

    var topYazarlar = topN(yazarFreq, 15).map(function(e){ return e[0]; });
    var nodesMap = {};
    var links = [];

    Object.entries(yazarKisiLinks).forEach(function(e) {
        var parts = e[0].split("|||");
        var yazar = parts[0], kisi = parts[1];
        if (topYazarlar.indexOf(yazar) === -1) return;
        if (!nodesMap[yazar]) nodesMap[yazar] = { id: yazar, type: "A", weight: yazarFreq[yazar]||1 };
        if (!nodesMap[kisi]) nodesMap[kisi] = { id: kisi, type: "B", weight: 1 };
        links.push({ source: yazar, target: kisi, value: e[1] });
    });

    drawNetwork("agYazarKisi", Object.values(nodesMap), links);
})();

// Tür-Yazar Ağı (ilk 8 tür, ilk 12 yazar)
(function() {
    var turYazarLinks = {};
    rawItems.forEach(function(item) {
        if (!item.subject || !item.creator) return;
        var tur = item.subject.split(";")[0].trim();
        var yazar = item.creator.split(";")[0].trim();
        if (!tur || !yazar) return;
        var key = tur + "|||" + yazar;
        turYazarLinks[key] = (turYazarLinks[key]||0) + 1;
    });

    var topTurler = topN(turFreq, 8).map(function(e){ return e[0]; });
    var topYazarlar12 = topN(yazarFreq, 12).map(function(e){ return e[0]; });
    var nodesMap = {};
    var links = [];

    Object.entries(turYazarLinks).forEach(function(e) {
        var parts = e[0].split("|||");
        var tur = parts[0], yazar = parts[1];
        if (topTurler.indexOf(tur) === -1) return;
        if (topYazarlar12.indexOf(yazar) === -1) return;
        if (!nodesMap[tur]) nodesMap[tur] = { id: tur, type: "A", weight: turFreq[tur]||1 };
        if (!nodesMap[yazar]) nodesMap[yazar] = { id: yazar, type: "B", weight: yazarFreq[yazar]||1 };
        links.push({ source: tur, target: yazar, value: e[1] });
    });

    drawNetwork("agTurYazar", Object.values(nodesMap), links);
})();

// Yayınevi-Tür Ağı (ilk 10 yayınevi, ilk 8 tür)
(function() {
    var yayineviFreq = countFreq("publisher", ";");
    var yayineviTurLinks = {};
    rawItems.forEach(function(item) {
        if (!item.publisher || !item.subject) return;
        var yay = item.publisher.split(";")[0].trim();
        var tur = item.subject.split(";")[0].trim();
        if (!yay || !tur) return;
        var key = yay + "|||" + tur;
        yayineviTurLinks[key] = (yayineviTurLinks[key]||0) + 1;
    });

    var topYayinevleri = topN(yayineviFreq, 10).map(function(e){ return e[0]; });
    var topTurler8 = topN(turFreq, 8).map(function(e){ return e[0]; });
    var nodesMap = {};
    var links = [];

    Object.entries(yayineviTurLinks).forEach(function(e) {
        var parts = e[0].split("|||");
        var yay = parts[0], tur = parts[1];
        if (topYayinevleri.indexOf(yay) === -1) return;
        if (topTurler8.indexOf(tur) === -1) return;
        if (!nodesMap[yay]) nodesMap[yay] = { id: yay, type: "A", weight: yayineviFreq[yay]||1 };
        if (!nodesMap[tur]) nodesMap[tur] = { id: tur, type: "B", weight: turFreq[tur]||1 };
        links.push({ source: yay, target: tur, value: e[1] });
    });

    drawNetwork("agYayineviTur", Object.values(nodesMap), links);
})();

</script>
